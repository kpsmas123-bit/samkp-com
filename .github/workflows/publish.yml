name: Publish samkp.com

# Manual trigger — edit in Canva, then run this from the Actions tab.
on:
  workflow_dispatch:

permissions:
  contents: write   # commit the refreshed export back to the repo
  pages: write      # deploy to GitHub Pages
  id-token: write   # OIDC token for deploy-pages

# Never let two publishes race (they both push + deploy).
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Refresh the access token, PERSIST the rotated refresh token back to the
      # CANVA_REFRESH_TOKEN secret (via GH_PAT), then export every page to assets/.
      - name: Export Canva pages
        env:
          CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
          CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
          CANVA_REFRESH_TOKEN: ${{ secrets.CANVA_REFRESH_TOKEN }}
          CANVA_DESIGN_ID: ${{ secrets.CANVA_DESIGN_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python canva_export.py

      - name: Build index.html
        run: python build_site.py

      - name: Commit refreshed export
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets index.html
          if git diff --cached --quiet; then
            echo "No content changes to commit."
          else
            git commit -m "Publish: Canva export $(date -u +%FT%TZ)"
            git push
          fi

      - name: Assemble _site
        run: |
          mkdir -p _site
          cp index.html CNAME _site/
          cp -r assets _site/assets

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
